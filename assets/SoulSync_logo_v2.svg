<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient - Deep Purple to Pink -->
    <linearGradient id="soulGradientV2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#4338CA;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#soulGradientV2)"/>
  
  <!-- Infinity Symbol representing "Sync" -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Left loop -->
    <path d="M0 0 
             C-60 -60, -120 -40, -120 0 
             C-120 60, -60 80, 0 0
             C60 -80, 120 -60, 120 0
             C120 60, 60 80, 0 0"
          fill="none"
          stroke="#FFFFFF"
          stroke-width="28"
          stroke-linecap="round"/>
    
    <!-- Enhanced infinity with speech bubble hints -->
    <ellipse cx="-70" cy="0" rx="55" ry="45" fill="#FFFFFF" opacity="0.95"/>
    <ellipse cx="70" cy="0" rx="55" ry="45" fill="#FFFFFF" opacity="0.95"/>
    
    <!-- Chat bubble tail - left -->
    <path d="M-110 30 Q-130 50, -100 60 L-90 50 Q-105 45, -110 30" fill="#FFFFFF"/>
    
    <!-- Chat bubble tail - right -->
    <path d="M110 30 Q130 50, 100 60 L90 50 Q105 45, 110 30" fill="#FFFFFF"/>
  </g>
  
  <!-- Center spark/connection point -->
  <circle cx="256" cy="256" r="15" fill="#FFFFFF"/>
  <circle cx="256" cy="256" r="8" fill="#EC4899"/>
</svg>